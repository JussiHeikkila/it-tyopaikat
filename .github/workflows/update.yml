name: Päivitä IT-työpaikat

on:
  schedule:
    - cron: '0 6 * * *'  # Joka päivä klo 06:00 UTC (= 08:00 tai 09:00 Suomen aikaa)
  workflow_dispatch:       # Mahdollistaa manuaalisen ajon

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Asenna riippuvuudet
        run: pip install requests beautifulsoup4

      - name: Aja scraper
        run: python scrape_jobs.py

      - name: Committaa ja pushaa muutokset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ index.html
          git diff --cached --quiet || git commit -m "Päivitä työpaikkatiedot $(date +%Y-%m-%d)"
          git push
